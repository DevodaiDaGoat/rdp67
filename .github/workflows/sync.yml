name: Sync to Two Repos

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # =========================
      # SYNC TO YOUR REPO
      # =========================
      - name: Sync to YOUR repo
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e

          DEST1="devadarshdev22-lgtm/rdp6t7"

          git remote remove dest1 2>/dev/null || true
          git remote add dest1 https://x-access-token:${TOKEN}@github.com/${DEST1}.git

          echo "🚀 Syncing to YOUR repo..."
          git push dest1 main --force

      # =========================
      # SYNC TO BROTHER REPO
      # =========================
      - name: Sync to BROTHER repo
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e

          DEST2="BROTHER_USERNAME/BROTHER_REPO"

          git remote remove dest2 2>/dev/null || true
          git remote add dest2 https://x-access-token:${TOKEN}@github.com/${DEST2}.git

          echo "🚀 Syncing to BROTHER repo..."
          git push dest2 main --force
